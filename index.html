<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siva Shoe Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>👟 Siva Shoe Store</h1>
    <p>Find your perfect pair</p>
</header>

<section class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" alt="Nike Shoe">
        <h2>Nike Air Max</h2>
        <p>₹8,999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400" alt="Adidas Shoe">
        <h2>Adidas Runner</h2>
        <p>₹7,499</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1543508282-6319a3e2621f?w=400" alt="Puma Shoe">
        <h2>Puma Sport</h2>
        <p>₹6,999</p>
        <button>Buy Now</button>
    </div>

</section>

<footer>
    <p>© 2026 Siva Shoe Store</p>
</footer>

</body>
</html>
